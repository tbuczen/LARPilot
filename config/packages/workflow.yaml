framework:
    workflows:
        larp_stage_status:
            type: 'state_machine'
            audit_trail:
                enabled: true
            marking_store:
                type: 'method'
                property: 'marking'
            supports:
                - App\Domain\Core\Entity\Larp
            initial_marking: DRAFT
            places:
                - DRAFT
                - WIP
                - PUBLISHED
                - INQUIRIES
                - NEGOTIATION
                - COSTUME_CHECK
                - IN_PROGRESS
                - CONFIRMED
                - CANCELLED
                - COMPLETED
            transitions:
                to_wip:
                    from: DRAFT
                    to: WIP
                to_published:
                    from: [WIP, DRAFT]
                    to: PUBLISHED
                to_inquiries:
                    from: PUBLISHED
                    to: INQUIRIES
                to_confirmed:
                    from: [INQUIRIES, PUBLISHED]
                    to: CONFIRMED
                to_negotiation:
                    from: INQUIRIES
                    to: NEGOTIATION
                to_costume_check:
                    from: [INQUIRIES, NEGOTIATION]
                    to: COSTUME_CHECK
                to_in_progress:
                    from: [CONFIRMED, INQUIRIES, NEGOTIATION, COSTUME_CHECK]
                    to: IN_PROGRESS
                to_cancelled:
                    from: [CONFIRMED, INQUIRIES, PUBLISHED, NEGOTIATION, COSTUME_CHECK, IN_PROGRESS]
                    to: CANCELLED
                to_completed:
                    from: [CONFIRMED, IN_PROGRESS]
                    to: COMPLETED
                back_to_draft:
                    from: [WIP, PUBLISHED]
                    to: DRAFT
                back_to_wip:
                    from: PUBLISHED
                    to: WIP